<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Cadastro de Usuário</h1>
        <form method="post">
            {% csrf_token %}  <!-- Token CSRF para proteger o formulário -->
            {{ form.as_p }}  <!-- Renderiza os campos do formulário como parágrafos -->
            <button type="submit" class="btn btn-success">Cadastrar</button>  <!-- Botão de envio do formulário -->
        </form>
        <a href="{% url 'login' %}">Já tem uma conta? Faça login.</a>  <!-- Link para a página de login -->
    </div>
</body>
</html>
